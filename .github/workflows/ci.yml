name: ci
on:
  push: { branches: [master] }
  pull_request: {}
permissions: { contents: read }
jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # needed for only-new-issues / --new-from-rev
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - run: go build ./...
      - run: go test -count=1 -short -timeout 60s ./...
      # Config validation gates on ERRORS (exit 1). It is intentionally NOT
      # --strict: many warnings are environment-dependent (empty API-key env
      # vars at lint time) and advisory, so they must not fail CI.
      - run: go run . validate
      # golangci-lint v2 (v1.61 cannot target go 1.25). only-new-issues keeps the
      # pre-existing tree from blocking; new code must be lint-clean.
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          only-new-issues: true
