pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -l {staged_files}
      fail_text: |
        gofmt found unformatted files above. Run:
            go fmt ./...
        then re-stage and commit.
    vet:
      glob: "*.go"
      run: /usr/local/go/bin/go vet ./...
    build:
      glob: "*.go"
      run: /usr/local/go/bin/go build ./...
    test:
      glob: "*.go"
      run: /usr/local/go/bin/go test -count=1 -short -timeout 30s ./...
    golangci:
      glob: "*.go"
      run: golangci-lint run --new-from-rev=HEAD~1

pre-push:
  commands:
    validate:
      # Gates on errors (exit 1). Not --strict: warnings are advisory and many
      # are environment-dependent (empty API-key env vars), so they don't block.
      run: /usr/local/go/bin/go run . validate
