<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" fill="none" role="img" aria-label="Draftyard logo">
  <!-- Light card: legible on any GitHub README theme (light or dark). -->
  <rect width="640" height="180" rx="18" fill="#FFFFFF" stroke="#0D1117" stroke-width="2"/>

  <!-- Icon: a yard (square) bisected by a gate (vertical bar). A filled draft sits on the staging side, awaiting approval before passing through. -->
  <g transform="translate(40 50)">
    <rect width="80" height="80" stroke="#0D1117" stroke-width="4"/>
    <rect x="12" y="24" width="22" height="32" fill="#0D1117"/>
    <line x1="52" y1="0" x2="52" y2="80" stroke="#0D1117" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="125"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"
        font-size="72" font-weight="700"
        letter-spacing="-1">
    <tspan fill="#0D1117">draft</tspan><tspan fill="#00D4AA">yard</tspan>
  </text>
</svg>
